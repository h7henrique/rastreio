<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rastreio EasyOrder </title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Oswald:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg: #0C0C0C;
            --card: #161616;
            --primary: #EA1D2C;
            --text: #FFFFFF;
            --success: #10B981;
            --border: #262626;
            --muted: #999999;
            --header-h: 96px;
            --card-max: 860px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        header {
            position: relative;
            z-index: 120;
            min-height: var(--header-h);
            background: rgba(12, 12, 12, 0.92);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 14px 16px 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .title {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(1rem, 1.8vw, 1.3rem);
            letter-spacing: 1.5px;
            color: var(--text);
            margin: 0;
            text-transform: uppercase;
            line-height: 1.1;
        }

        .status-container {
            margin-top: 8px;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--card);
            color: var(--text);
            padding: 8px 14px;
            border-radius: 999px;
            font-weight: 700;
            font-size: clamp(0.72rem, 2.4vw, 0.85rem);
            border: 1px solid var(--border);
            text-align: center;
            max-width: min(92vw, 420px);
            line-height: 1.2;
            flex-wrap: wrap;
        }

        .status-badge i {
            color: var(--primary);
        }

        .status-badge.success {
            border-color: var(--success);
        }

        .status-badge.success i {
            color: var(--success);
        }

        #map-wrapper {
            position: relative;
            width: 100%;
            height: calc(100dvh - var(--header-h));
            min-height: 320px;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            inset: 0;
            z-index: 1;
            filter: grayscale(0.2) contrast(1.05);
        }

        #loading-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 150;
            transition: opacity 0.8s ease;
        }

        .footer-shell {
            position: absolute;
            left: 12px;
            right: 12px;
            bottom: calc(12px + var(--safe-bottom));
            z-index: 100;
            display: flex;
            justify-content: center;
            pointer-events: none;
        }

        .footer-info {
            width: 100%;
            max-width: var(--card-max);
            background: rgba(22, 22, 22, 0.96);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.55);
            animation: slideUp 0.45s ease-out;
            pointer-events: auto;
        }

        @keyframes slideUp {
            from {
                transform: translateY(80px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .moto-icon-box {
            width: 52px;
            height: 52px;
            min-width: 52px;
            background: var(--bg);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.25rem;
            color: var(--primary);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .pulse {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 16px;
            border: 2px solid var(--primary);
            animation: pulsar 2s infinite;
        }

        @keyframes pulsar {
            0% {
                transform: scale(1);
                opacity: 0.5;
            }

            100% {
                transform: scale(1.4);
                opacity: 0;
            }
        }

        .info-text {
            flex: 1;
            min-width: 0;
        }

        .info-text h3 {
            margin: 0;
            font-size: clamp(0.92rem, 3vw, 1.05rem);
            font-weight: 800;
            color: var(--text);
            line-height: 1.2;
            word-break: break-word;
        }

        .info-text p {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: clamp(0.74rem, 2.6vw, 0.88rem);
            font-weight: 500;
            line-height: 1.35;
            word-break: break-word;
        }

        .btn-call {
            width: 44px;
            height: 44px;
            min-width: 44px;
            border-radius: 50%;
            background: #222;
            display: none;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-decoration: none;
            border: 1px solid var(--border);
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .btn-call:active {
            transform: scale(0.96);
        }

        .btn-call:hover {
            background: #2b2b2b;
        }

        .loader {
            width: 42px;
            height: 42px;
            border: 3px solid #222;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* TABLETS */
        @media (min-width: 768px) {
            :root {
                --header-h: 104px;
            }

            header {
                padding: 16px 20px 14px;
            }

            .footer-shell {
                left: 20px;
                right: 20px;
                bottom: 20px;
            }

            .footer-info {
                padding: 16px 18px;
                gap: 14px;
            }

            .moto-icon-box {
                width: 56px;
                height: 56px;
                min-width: 56px;
                font-size: 1.35rem;
            }

            .btn-call {
                width: 46px;
                height: 46px;
                min-width: 46px;
            }
        }

        /* CELULARES PEQUENOS */
        @media (max-width: 480px) {
            :root {
                --header-h: 92px;
            }

            header {
                padding-left: 12px;
                padding-right: 12px;
            }

            .status-badge {
                padding: 7px 12px;
                max-width: 94vw;
            }

            .footer-shell {
                left: 10px;
                right: 10px;
                bottom: calc(10px + var(--safe-bottom));
            }

            .footer-info {
                padding: 12px;
                gap: 10px;
                border-radius: 16px;
            }

            .moto-icon-box {
                width: 48px;
                height: 48px;
                min-width: 48px;
                border-radius: 14px;
            }

            .pulse {
                border-radius: 14px;
            }

            .btn-call {
                width: 42px;
                height: 42px;
                min-width: 42px;
            }
        }

        /* QUANDO A ALTURA FOR MUITO BAIXA */
        @media (max-height: 620px) {
            :root {
                --header-h: 82px;
            }

            header {
                padding-top: 10px;
                padding-bottom: 10px;
            }

            .status-container {
                margin-top: 6px;
            }

            .footer-info {
                padding: 12px;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1 class="title">EasyOrder <span style="color:var(--primary)">Live</span></h1>
        <div class="status-container">
            <div class="status-badge" id="status-badge">
                <i class="fa-solid fa-circle-notch fa-spin"></i> Conectando...
            </div>
        </div>
    </header>

    <div id="map-wrapper">
        <div id="loading-overlay">
            <div class="loader"></div>
        </div>

        <div id="map"></div>

        <div class="footer-shell">
            <div class="footer-info">
                <div class="moto-icon-box" id="moto-icon">
                    <div class="pulse"></div>
                    <i class="fa-solid fa-motorcycle"></i>
                </div>

                <div class="info-text">
                    <h3 id="footer-title">Localizando...</h3>
                    <p id="moto-nome">Buscando dados do GPS</p>
                </div>

                <a href="#" id="link-zap" class="btn-call" aria-label="Falar no WhatsApp">
                    <i class="fa-brands fa-whatsapp"></i>
                </a>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://tyokrmmtluixdosmmygf.supabase.co';
        const supabaseKey = 'sb_publishable_xm_hnVYyfmh4mONa2Hy-7A_3M9M0ftf';
        const db = supabase.createClient(supabaseUrl, supabaseKey);

        let map = null;
        let marker = null;

        const iconMoto = L.divIcon({
            html: `
                <div style="
                    background:#EA1D2C;
                    border:2px solid white;
                    border-radius:50%;
                    width:36px;
                    height:36px;
                    display:flex;
                    justify-content:center;
                    align-items:center;
                    box-shadow:0 0 20px rgba(234, 29, 44, 0.6)
                ">
                    <i class="fa-solid fa-motorcycle" style="color:white; font-size:16px"></i>
                </div>
            `,
            className: '',
            iconSize: [36, 36],
            iconAnchor: [18, 18]
        });

        const ui = {
            setBadge: (html, type = 'normal') => {
                const el = document.getElementById('status-badge');
                el.innerHTML = html;
                el.className = 'status-badge ' + (type === 'success' ? 'success' : '');
            },
            hideLoading: () => {
                const loader = document.getElementById('loading-overlay');
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    if (map) {
                        setTimeout(() => map.invalidateSize(), 150);
                    }
                }, 800);
            }
        };

        async function initTracking() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const pedidoId = urlParams.get('pedido');

                if (!pedidoId) throw new Error('Pedido não informado');

                const { data: pedido, error: errP } = await db
                    .from('pedidos')
                    .select('*')
                    .eq('id', pedidoId)
                    .single();

                if (errP || !pedido) throw new Error('Pedido inexistente');

                if (pedido.status === 'entregue') {
                    ui.setBadge('<i class="fa-solid fa-check-double"></i> Entrega Concluída', 'success');
                    document.getElementById('footer-title').innerText = 'Pedido Entregue';
                    document.getElementById('moto-nome').innerText = 'Obrigado pela preferência!';
                    ui.hideLoading();
                    return;
                }

                if (!pedido.entregador_id || pedido.status === 'pendente' || pedido.status === 'preparando') {
                    ui.setBadge('<i class="fa-solid fa-utensils"></i> No fogão');
                    document.getElementById('footer-title').innerText = 'Preparando seu lanche';
                    document.getElementById('moto-nome').innerText = 'Aguardando saída para entrega.';
                    ui.hideLoading();
                    return;
                }

                const { data: moto } = await db
                    .from('entregadores')
                    .select('*')
                    .eq('id', pedido.entregador_id)
                    .single();

                ui.hideLoading();
                ui.setBadge('<i class="fa-solid fa-bolt"></i> Saiu para entrega', 'success');
                document.getElementById('footer-title').innerText = 'O motoboy está a caminho!';
                document.getElementById('moto-nome').innerText = `Entregador: ${moto.nome}`;

                if (moto.zap) {
                    const btnZap = document.getElementById('link-zap');
                    btnZap.href = `https://wa.me/55${moto.zap.replace(/\D/g, '')}`;
                    btnZap.style.display = 'flex';
                }

                map = L.map('map', { zoomControl: false }).setView(
                    [moto.lat || -23.55, moto.lng || -46.63],
                    16
                );

                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; CartoDB'
                }).addTo(map);

                if (moto.lat && moto.lng) {
                    marker = L.marker([moto.lat, moto.lng], { icon: iconMoto }).addTo(map);
                }

                setTimeout(() => map.invalidateSize(), 200);

                db.channel('live-track')
                    .on('postgres_changes', {
                        event: 'UPDATE',
                        schema: 'public',
                        table: 'entregadores',
                        filter: `id=eq.${moto.id}`
                    }, payload => {
                        const { lat, lng } = payload.new;
                        if (lat && lng) {
                            if (!marker) {
                                marker = L.marker([lat, lng], { icon: iconMoto }).addTo(map);
                            } else {
                                marker.setLatLng([lat, lng]);
                            }

                            map.panTo([lat, lng], {
                                animate: true,
                                duration: 1.5
                            });
                        }
                    })
                    .subscribe();

            } catch (e) {
                ui.setBadge('<i class="fa-solid fa-circle-exclamation"></i> Erro no rastreio');
                document.getElementById('footer-title').innerText = 'Erro ao carregar';
                document.getElementById('moto-nome').innerText = e.message;
                ui.hideLoading();
            }
        }

        window.addEventListener('load', initTracking);
        window.addEventListener('resize', () => {
            if (map) {
                setTimeout(() => map.invalidateSize(), 120);
            }
        });
        window.addEventListener('orientationchange', () => {
            if (map) {
                setTimeout(() => map.invalidateSize(), 200);
            }
        });
    </script>
</body>

</html>
