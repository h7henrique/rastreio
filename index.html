<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>EasyOrder • Rastreio PRO</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --bg:#07080b;
      --card:#111318;
      --line:#262b36;
      --text:#f4f7fb;
      --muted:#98a2b3;
      --red:#ea1d2c;
      --green:#22c55e;
      --yellow:#f59e0b;
      --blue:#3b82f6;
      --shadow:0 20px 70px rgba(0,0,0,.38);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }

    * { box-sizing:border-box; margin:0; padding:0; }
    html, body { width:100%; min-height:100%; background:var(--bg); color:var(--text); font-family:Inter,sans-serif; }
    body { overflow:hidden; }

    .app {
      height:100dvh;
      display:grid;
      grid-template-rows:auto 1fr;
      background:
        radial-gradient(circle at top right, rgba(234,29,44,.20), transparent 28%),
        radial-gradient(circle at top left, rgba(59,130,246,.12), transparent 24%),
        var(--bg);
    }

    header {
      position:relative;
      z-index:30;
      padding:16px 16px 12px;
      background:rgba(7,8,11,.86);
      backdrop-filter:blur(18px);
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .top {
      max-width:980px;
      margin:0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .brand { display:flex; align-items:center; gap:12px; min-width:0; }
    .logo {
      width:46px; height:46px; border-radius:16px;
      background:linear-gradient(135deg,var(--red),#ff5965);
      display:grid; place-items:center;
      box-shadow:0 14px 34px rgba(234,29,44,.28);
      flex:0 0 auto;
    }

    .brand h1 { font-size:1.05rem; font-weight:900; letter-spacing:-.04em; white-space:nowrap; }
    .brand p { color:var(--muted); font-size:.78rem; font-weight:700; margin-top:2px; }

    .badge {
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      padding:10px 12px;
      border-radius:999px;
      font-size:.78rem;
      font-weight:900;
      color:#d7dce5;
      white-space:nowrap;
    }

    .main { position:relative; min-height:0; }
    #map {
      position:absolute;
      inset:0;
      z-index:1;
      background:#0b0c10;
      filter:saturate(.9) contrast(1.05);
    }

    .loading {
      position:absolute;
      inset:0;
      z-index:20;
      background:var(--bg);
      display:grid;
      place-items:center;
      transition:.4s;
    }

    .loader {
      width:48px;
      height:48px;
      border:4px solid #20232b;
      border-top-color:var(--red);
      border-radius:50%;
      animation:spin 1s linear infinite;
    }

    @keyframes spin { to { transform:rotate(360deg); } }

    .sheet-wrap {
      position:absolute;
      left:12px;
      right:12px;
      bottom:calc(12px + var(--safe-bottom));
      z-index:10;
      display:flex;
      justify-content:center;
      pointer-events:none;
    }

    .sheet {
      width:100%;
      max-width:980px;
      pointer-events:auto;
      background:linear-gradient(180deg,rgba(17,19,24,.97),rgba(12,14,18,.97));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
      border-radius:28px;
      overflow:hidden;
      backdrop-filter:blur(18px);
    }

    .grab { width:44px; height:5px; border-radius:99px; background:#3b414d; margin:10px auto 6px; }
    .sheet-content { padding:12px 14px 16px; }

    .status-row {
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
      margin-bottom:14px;
    }

    .status-title { min-width:0; }
    .status-title h2 { font-size:1.28rem; line-height:1.05; font-weight:900; letter-spacing:-.05em; }
    .status-title p { color:var(--muted); font-size:.86rem; line-height:1.38; margin-top:6px; font-weight:600; }

    .status-icon {
      width:54px; height:54px; border-radius:18px;
      display:grid; place-items:center;
      background:rgba(234,29,44,.14);
      color:#ff7882;
      border:1px solid rgba(234,29,44,.25);
      flex:0 0 auto;
      font-size:1.25rem;
    }

    .status-icon.success { background:rgba(34,197,94,.14); color:#86efac; border-color:rgba(34,197,94,.25); }
    .status-icon.blue { background:rgba(59,130,246,.14); color:#93c5fd; border-color:rgba(59,130,246,.25); }
    .status-icon.yellow { background:rgba(245,158,11,.14); color:#fcd34d; border-color:rgba(245,158,11,.25); }

    .timeline {
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
      margin:16px 0;
    }

    .step {
      padding:12px 8px;
      border-radius:18px;
      background:rgba(255,255,255,.035);
      border:1px solid rgba(255,255,255,.07);
      text-align:center;
      min-height:78px;
      color:var(--muted);
      transition:.25s;
    }

    .step.active {
      background:rgba(234,29,44,.12);
      border-color:rgba(234,29,44,.35);
      color:#fff;
      transform:translateY(-2px);
    }

    .step.done {
      background:rgba(34,197,94,.09);
      border-color:rgba(34,197,94,.20);
      color:#d8ffe5;
    }

    .step i { display:block; font-size:1rem; margin-bottom:7px; }
    .step span { font-size:.72rem; font-weight:900; line-height:1.12; display:block; }

    .details {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:12px;
    }

    .detail-card {
      border:1px solid rgba(255,255,255,.07);
      background:rgba(255,255,255,.035);
      border-radius:18px;
      padding:12px;
      min-width:0;
    }
.sheet {
  transition: all 0.3s ease;
}

/* estado fechado */
.sheet.minimized {
  transform: translateY(60%);
}

/* estado aberto */
.sheet.expanded {
  transform: translateY(0);
}
    .detail-card small {
      display:block;
      color:var(--muted);
      font-size:.72rem;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.08em;
      margin-bottom:5px;
    }

    .detail-card strong {
      display:block;
      font-size:.92rem;
      font-weight:900;
      word-break:break-word;
    }

    .actions { display:flex; gap:10px; margin-top:12px; }
    .btn {
      flex:1;
      min-height:46px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.05);
      color:#fff;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      text-decoration:none;
      font-weight:900;
      font-size:.86rem;
    }

    .btn.whats { display:none; background:#22c55e; color:#04110a; border-color:transparent; }

    .error-box {
      display:none;
      position:absolute;
      inset:0;
      z-index:25;
      background:var(--bg);
      place-items:center;
      padding:20px;
      text-align:center;
    }

    .error-card {
      max-width:440px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:26px;
      padding:24px;
      box-shadow:var(--shadow);
    }

    .error-card i { font-size:2rem; color:var(--red); margin-bottom:12px; }
    .error-card h2 { font-size:1.45rem; letter-spacing:-.04em; margin-bottom:8px; }
    .error-card p { color:var(--muted); line-height:1.5; font-weight:600; }

    .leaflet-control-attribution { display:none!important; }

    .moto-marker {
      width:42px; height:42px; border-radius:50%;
      background:var(--red);
      border:3px solid white;
      display:grid;
      place-items:center;
      color:#fff;
      box-shadow:0 0 0 12px rgba(234,29,44,.18),0 14px 28px rgba(0,0,0,.35);
      animation:bounce 1.2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%,100% { transform:translateY(0); }
      50% { transform:translateY(-4px); }
    }

    @media(max-width:700px) {
      header { padding:12px 12px 10px; }
      .logo { width:42px; height:42px; border-radius:14px; }
      .brand h1 { font-size:.98rem; }
      .badge { font-size:.72rem; padding:9px 10px; }
      .sheet-wrap { left:8px; right:8px; bottom:calc(8px + var(--safe-bottom)); }
      .sheet { border-radius:24px; }
      .status-title h2 { font-size:1.14rem; }
      .timeline { grid-template-columns:repeat(4,minmax(0,1fr)); gap:6px; }
      .step { padding:10px 4px; border-radius:14px; min-height:72px; }
      .step span { font-size:.65rem; }
      .details { grid-template-columns:1fr; }
    }

    @media(max-height:660px) {
      .timeline { display:none; }
      .details { grid-template-columns:1fr 1fr; }
      .sheet-content { padding-bottom:12px; }
    }
  </style>
</head>

<body>
  <div class="app">
    <header>
      <div class="top">
        <div class="brand">
          <div class="logo"><i class="fa-solid fa-bolt"></i></div>
          <div>
            <h1>EasyOrder Live</h1>
            <p>Rastreio em tempo real</p>
          </div>
        </div>
        <div class="badge" id="top-badge">
          <i class="fa-solid fa-circle-notch fa-spin"></i>
          Conectando
        </div>
      </div>
    </header>

    <main class="main">
      <div id="map"></div>

      <div class="loading" id="loading">
        <div class="loader"></div>
      </div>

      <div class="error-box" id="error-box">
        <div class="error-card">
          <i class="fa-solid fa-triangle-exclamation"></i>
          <h2>Não foi possível rastrear</h2>
          <p id="error-message">Verifique o link do pedido.</p>
        </div>
      </div>

      <div class="sheet-wrap">
        <section class="sheet">
          <div class="grab"></div>
          <div class="sheet-content">
            <div class="status-row">
              <div class="status-title">
                <h2 id="status-title">Carregando pedido...</h2>
                <p id="status-desc">Estamos buscando os dados do seu pedido.</p>
                <div style="display:flex;justify-content:center;margin-bottom:8px;">
  <button id="toggle-card" style="
    background:#222;
    border:none;
    color:white;
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
    cursor:pointer;
  ">
    ▲ Expandir
  </button>
</div>
              </div>
              <div class="status-icon" id="status-icon">
                <i class="fa-solid fa-circle-notch fa-spin"></i>
              </div>
            </div>

            <div class="timeline">
              <div class="step" id="step-pendente">
                <i class="fa-solid fa-receipt"></i>
                <span>Recebido</span>
              </div>
              <div class="step" id="step-preparando">
                <i class="fa-solid fa-utensils"></i>
                <span>Preparo</span>
              </div>
              <div class="step" id="step-em_rota">
                <i class="fa-solid fa-motorcycle"></i>
                <span>Em rota</span>
              </div>
              <div class="step" id="step-entregue">
                <i class="fa-solid fa-check-double"></i>
                <span>Entregue</span>
              </div>
            </div>

            <div class="details">
              <div class="detail-card">
                <small>Pedido</small>
                <strong id="pedido-id">-</strong>
              </div>
              <div class="detail-card">
                <small>Total</small>
                <strong id="pedido-total">-</strong>
              </div>
              <div class="detail-card">
                <small>Cliente</small>
                <strong id="cliente-nome">-</strong>
              </div>
              <div class="detail-card">
                <small>Entregador</small>
                <strong id="entregador-nome">Aguardando</strong>
              </div>
            </div>

            <div class="actions">
              <a class="btn" href="#" onclick="location.reload();return false;">
                <i class="fa-solid fa-rotate"></i>
                Atualizar
              </a>
              <a class="btn whats" id="btn-whats" href="#" target="_blank">
                <i class="fa-brands fa-whatsapp"></i>
                Chamar entregador
              </a>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script>
    const sheet = document.querySelector('.sheet');
const btn = document.getElementById('toggle-card');

let expanded = true;

btn.addEventListener('click', () => {
  expanded = !expanded;

  if (expanded) {
    sheet.classList.remove('minimized');
    sheet.classList.add('expanded');
    btn.innerText = '▼ Recolher';
  } else {
    sheet.classList.remove('expanded');
    sheet.classList.add('minimized');
    btn.innerText = '▲ Expandir';
  }
});
    const supabaseUrl = 'https://tyokrmmtluixdosmmygf.supabase.co';
    const supabaseKey = 'sb_publishable_xm_hnVYyfmh4mONa2Hy-7A_3M9M0ftf';
    const db = supabase.createClient(supabaseUrl, supabaseKey);

    let map = null;
    let marker = null;
    let pedidoAtual = null;

    const money = (v) => new Intl.NumberFormat('pt-BR', {
      style: 'currency',
      currency: 'BRL'
    }).format(Number(v || 0));

    const motoIcon = L.divIcon({
      html: '<div class="moto-marker"><i class="fa-solid fa-motorcycle"></i></div>',
      className: '',
      iconSize: [42, 42],
      iconAnchor: [21, 21]
    });

    function getPedidoId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('pedido') || params.get('id') || params.get('pedido_id');
    }

    function hideLoading() {
      const loading = document.getElementById('loading');
      loading.style.opacity = '0';
      setTimeout(() => {
        loading.style.display = 'none';
        if (map) setTimeout(() => map.invalidateSize(), 100);
      }, 350);
    }

    function showError(msg) {
      document.getElementById('error-message').textContent = msg;
      document.getElementById('error-box').style.display = 'grid';
      hideLoading();
    }

    function setTopBadge(text, icon = 'fa-circle-info', type = '') {
      const el = document.getElementById('top-badge');
      el.innerHTML = '<i class="fa-solid ' + icon + '"></i> ' + text;
      if (type === 'success') el.style.borderColor = 'rgba(34,197,94,.32)';
    }

    function resetSteps() {
      ['pendente','preparando','em_rota','entregue'].forEach(s => {
        document.getElementById('step-' + s).className = 'step';
      });
    }

    function updateTimeline(status) {
      resetSteps();
      const order = ['pendente','preparando','em_rota','entregue'];
      const idx = order.indexOf(status);
      order.forEach((s, i) => {
        const el = document.getElementById('step-' + s);
        if (idx === -1) return;
        if (i < idx) el.classList.add('done');
        if (i === idx) el.classList.add('active');
      });
    }

    function updateStatusUI(pedido) {
      const status = pedido.status || 'pendente';
      const title = document.getElementById('status-title');
      const desc = document.getElementById('status-desc');
      const icon = document.getElementById('status-icon');

      document.getElementById('pedido-id').textContent = '#' + pedido.id;
      document.getElementById('pedido-total').textContent = money(pedido.total);
      document.getElementById('cliente-nome').textContent = pedido.cliente_nome || 'Cliente';

      icon.className = 'status-icon';

      if (status === 'pendente') {
        title.textContent = 'Pedido recebido';
        desc.textContent = 'A loja recebeu seu pedido e em breve vai confirmar.';
        icon.innerHTML = '<i class="fa-solid fa-receipt"></i>';
        setTopBadge('Pedido recebido', 'fa-receipt');
      } else if (status === 'preparando') {
        title.textContent = 'Seu pedido está em preparo';
        desc.textContent = 'A cozinha já começou a preparar seu pedido.';
        icon.classList.add('yellow');
        icon.innerHTML = '<i class="fa-solid fa-utensils"></i>';
        setTopBadge('Em preparo', 'fa-utensils');
      } else if (status === 'aguardando_entregador') {
        title.textContent = 'Aguardando entregador';
        desc.textContent = 'Seu pedido ficou pronto e está aguardando despacho.';
        icon.classList.add('blue');
        icon.innerHTML = '<i class="fa-solid fa-clock"></i>';
        setTopBadge('Aguardando entregador', 'fa-clock');
      } else if (status === 'em_rota') {
        title.textContent = 'Saiu para entrega';
        desc.textContent = 'O entregador está a caminho. Acompanhe no mapa.';
        icon.classList.add('success');
        icon.innerHTML = '<i class="fa-solid fa-motorcycle"></i>';
        setTopBadge('Saiu para entrega', 'fa-motorcycle', 'success');
      } else if (status === 'entregue') {
        title.textContent = 'Pedido entregue';
        desc.textContent = 'Entrega concluída. Obrigado pela preferência!';
        icon.classList.add('success');
        icon.innerHTML = '<i class="fa-solid fa-check-double"></i>';
        setTopBadge('Entregue', 'fa-check-double', 'success');
      } else {
        title.textContent = 'Atualizando pedido';
        desc.textContent = 'Status atual: ' + status;
        icon.innerHTML = '<i class="fa-solid fa-circle-info"></i>';
        setTopBadge('Atualizando', 'fa-circle-info');
      }

      updateTimeline(status === 'aguardando_entregador' ? 'preparando' : status);
    }

    function initMap(lat = -23.5505, lng = -46.6333, zoom = 13) {
      if (map) return;

      map = L.map('map', {
        zoomControl: false,
        attributionControl: false
      }).setView([lat, lng], zoom);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 20
      }).addTo(map);

      setTimeout(() => map.invalidateSize(), 180);
    }

    function updateRiderUI(moto) {
      if (!moto) {
        document.getElementById('entregador-nome').textContent = 'Aguardando';
        document.getElementById('btn-whats').style.display = 'none';
        return;
      }

      document.getElementById('entregador-nome').textContent = moto.nome || 'Entregador';

      if (moto.zap) {
        const clean = String(moto.zap).replace(/\D/g, '');
        const btn = document.getElementById('btn-whats');
        btn.href = 'https://wa.me/55' + clean;
        btn.style.display = 'flex';
      }

      if (moto.lat && moto.lng) {
        initMap(Number(moto.lat), Number(moto.lng), 16);
        if (!marker) {
          marker = L.marker([moto.lat, moto.lng], { icon: motoIcon }).addTo(map);
        } else {
          marker.setLatLng([moto.lat, moto.lng]);
        }
        map.panTo([moto.lat, moto.lng], { animate: true, duration: 1 });
      }
    }

    async function loadEntregador(entregadorId) {
      if (!entregadorId) {
        updateRiderUI(null);
        return;
      }

      const { data, error } = await db
        .from('entregadores')
        .select('*')
        .eq('id', entregadorId)
        .maybeSingle();

      if (error || !data) {
        updateRiderUI(null);
        return;
      }

      updateRiderUI(data);
      listenEntregador(data.id);
    }

    function listenPedido(pedidoId) {
      db.channel('pedido-' + pedidoId)
        .on('postgres_changes', {
          event: 'UPDATE',
          schema: 'public',
          table: 'pedidos',
          filter: 'id=eq.' + pedidoId
        }, async payload => {
          pedidoAtual = payload.new;
          updateStatusUI(pedidoAtual);
          if (pedidoAtual.entregador_id) await loadEntregador(pedidoAtual.entregador_id);
        })
        .subscribe();
    }

    function listenEntregador(entregadorId) {
      db.channel('entregador-' + entregadorId)
        .on('postgres_changes', {
          event: 'UPDATE',
          schema: 'public',
          table: 'entregadores',
          filter: 'id=eq.' + entregadorId
        }, payload => {
          updateRiderUI(payload.new);
        })
        .subscribe();
    }

    async function init() {
      const pedidoId = getPedidoId();
      if (!pedidoId) return showError('Pedido não informado. Use ?id=ID_DO_PEDIDO ou ?pedido=ID_DO_PEDIDO.');

      const { data: pedido, error } = await db
        .from('pedidos')
        .select('*')
        .eq('id', pedidoId)
        .maybeSingle();

      if (error || !pedido) {
        return showError('Pedido não encontrado. Confira se o ID existe no banco.');
      }

      pedidoAtual = pedido;
      updateStatusUI(pedido);
      initMap();

      if (pedido.entregador_id) await loadEntregador(pedido.entregador_id);
      else hideLoading();

      listenPedido(pedido.id);
      hideLoading();
    }

    window.addEventListener('load', init);
    window.addEventListener('resize', () => {
      if (map) setTimeout(() => map.invalidateSize(), 100);
    });
    window.addEventListener('orientationchange', () => {
      if (map) setTimeout(() => map.invalidateSize(), 180);
    });
  </script>
</body>
</html>
