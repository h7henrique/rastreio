<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EasyOrder | Rastreio ao Vivo</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --bg: #0C0C0C; 
            --card: #161616;
            --primary: #EA1D2C; 
            --text: #FFFFFF; 
            --success: #10B981; 
            --border: #262626;
        }

        /* RESET PARA MOBILE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            height: -webkit-fill-available; /* Fix para mobile Safari */
            overflow: hidden; 
        }

        /* HEADER RESPONSIVO */
        header { 
            background: rgba(12, 12, 12, 0.95); 
            backdrop-filter: blur(10px);
            padding: 12px 15px; 
            text-align: center; 
            border-bottom: 1px solid var(--border); 
            z-index: 100;
            flex-shrink: 0; /* Impede o header de encolher */
        }
        
        .title { 
            font-family: 'Oswald', sans-serif; 
            font-size: 1.1rem; 
            letter-spacing: 1.5px; 
            text-transform: uppercase;
        }

        .status-container {
            margin-top: 6px;
            display: flex;
            justify-content: center;
        }

        .status-badge { 
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--card); 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-weight: 700; 
            font-size: 0.75rem; 
            border: 1px solid var(--border);
            white-space: nowrap; /* Evita quebra de linha no status */
        }
        
        .status-badge i { color: var(--primary); }
        .status-badge.success { border-color: var(--success); color: var(--success); }
        .status-badge.success i { color: var(--success); }

        /* MAPA OCUPANDO TODO O ESPAÇO RESTANTE */
        #map-wrapper { 
            flex: 1; 
            position: relative; 
            width: 100%; 
            overflow: hidden;
        }
        
        #map { 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
            filter: grayscale(0.2) contrast(1.1); 
        }

        #loading-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); display: flex; justify-content: center; 
            align-items: center; z-index: 150; transition: 0.6s ease; 
        }

        /* CARD DO ENTREGADOR ADAPTÁVEL */
        .footer-info { 
            position: absolute;
            bottom: 20px;
            left: 10px;
            right: 10px;
            max-width: 500px; /* Limite para telas grandes */
            margin: 0 auto;
            background: var(--card); 
            padding: 15px; 
            z-index: 100; 
            border-radius: 18px;
            border: 1px solid var(--border);
            display: flex; 
            align-items: center; 
            gap: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .moto-icon-box { 
            width: 48px; height: 48px; 
            flex-shrink: 0;
            background: var(--bg); 
            border-radius: 14px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 1.2rem; color: var(--primary);
            border: 1px solid var(--border);
            position: relative;
        }

        .pulse {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 14px;
            border: 2px solid var(--primary);
            animation: pulsar 2s infinite;
        }

        @keyframes pulsar {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .info-text { flex: 1; min-width: 0; /* Permite que o texto use reticências */ }
        
        .info-text h3 { 
            margin: 0; font-size: 0.95rem; font-weight: 800; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }
        
        .info-text p { 
            margin: 1px 0 0; color: #999; font-size: 0.75rem; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }

        .btn-call {
            width: 42px; height: 42px;
            flex-shrink: 0;
            border-radius: 50%;
            background: #25D366; /* Cor oficial WhatsApp */
            display: flex; justify-content: center; align-items: center;
            color: white; text-decoration: none;
            font-size: 1.3rem;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
        }

        /* LOADER */
        .loader { 
            width: 35px; height: 35px;
            border: 3px solid #222; 
            border-top: 3px solid var(--primary); 
            border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* AJUSTE PARA TELAS PEQUENAS (MOBILE) */
        @media (max-width: 360px) {
            .footer-info { padding: 10px; gap: 8px; }
            .moto-icon-box { width: 40px; height: 40px; }
            .info-text h3 { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1 class="title">EasyOrder <span style="color:var(--primary)">Live</span></h1>
        <div class="status-container">
            <div class="status-badge" id="status-badge">
                <i class="fa-solid fa-circle-notch fa-spin"></i> Conectando...
            </div>
        </div>
    </header>

    <div id="map-wrapper">
        <div id="loading-overlay"><div class="loader"></div></div>
        <div id="map"></div>

        <div class="footer-info">
            <div class="moto-icon-box" id="moto-icon">
                <div class="pulse"></div>
                <i class="fa-solid fa-motorcycle"></i>
            </div>
            <div class="info-text">
                <h3 id="footer-title">Localizando...</h3>
                <p id="moto-nome">Buscando dados do GPS</p>
            </div>
            <a href="#" id="link-zap" class="btn-call" style="display:none;"><i class="fa-brands fa-whatsapp"></i></a>
        </div>
    </div>

    <script>
        // -- SEU SCRIPT DO SUPABASE E LEAFLET CONTINUA AQUI IGUAL --
        // (Apenas certifique-se de manter a lógica de marcador e mapa)
        const supabaseUrl = 'https://tyokrmmtluixdosmmygf.supabase.co';
        const supabaseKey = 'sb_publishable_xm_hnVYyfmh4mONa2Hy-7A_3M9M0ftf';
        const db = supabase.createClient(supabaseUrl, supabaseKey);

        let map = null;
        let marker = null;

        const iconMoto = L.divIcon({
            html: '<div style="background:#EA1D2C; border:2px solid white; border-radius:50%; width:34px; height:34px; display:flex; justify-content:center; align-items:center; box-shadow:0 0 15px rgba(234, 29, 44, 0.6)"><i class="fa-solid fa-motorcycle" style="color:white; font-size:14px"></i></div>',
            className: '', iconSize: [34, 34], iconAnchor: [17, 17]
        });

        const ui = {
            setBadge: (html, type = 'normal') => {
                const el = document.getElementById('status-badge');
                el.innerHTML = html;
                el.className = 'status-badge ' + (type === 'success' ? 'success' : '');
            },
            hideLoading: () => {
                const loader = document.getElementById('loading-overlay');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 600);
            }
        };

        async function initTracking() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const pedidoId = urlParams.get('pedido');

                if(!pedidoId) throw new Error('Link Inválido');

                const { data: pedido, error: errP } = await db.from('pedidos').select('*').eq('id', pedidoId).single();
                if(errP || !pedido) throw new Error('Pedido não encontrado');

                if(pedido.status === 'entregue') {
                    ui.setBadge('<i class="fa-solid fa-check-double"></i> Entrega Concluída', 'success');
                    document.getElementById('footer-title').innerText = "Pedido Entregue";
                    document.getElementById('moto-nome').innerText = "Obrigado pela preferência!";
                    ui.hideLoading();
                    return;
                }

                if(!pedido.entregador_id || pedido.status !== 'saiu_para_entrega') {
                    ui.setBadge('<i class="fa-solid fa-utensils"></i> Em Preparação');
                    document.getElementById('footer-title').innerText = "No fogão";
                    document.getElementById('moto-nome').innerText = "Aguardando saída para entrega.";
                    ui.hideLoading();
                    return;
                }

                const { data: moto } = await db.from('entregadores').select('*').eq('id', pedido.entregador_id).single();

                ui.hideLoading();
                ui.setBadge('<i class="fa-solid fa-bolt"></i> Em Entrega', 'success');
                document.getElementById('footer-title').innerText = "Motoboy a caminho!";
                document.getElementById('moto-nome').innerText = `Entregador: ${moto.nome}`;

                if(moto.zap) {
                    const btnZap = document.getElementById('link-zap');
                    btnZap.href = `https://wa.me/55${moto.zap.replace(/\D/g,'')}`;
                    btnZap.style.display = 'flex';
                }

                map = L.map('map', { zoomControl: false }).setView([moto.lat || -23.55, moto.lng || -46.63], 16);

                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; CartoDB'
                }).addTo(map);

                if(moto.lat) {
                    marker = L.marker([moto.lat, moto.lng], {icon: iconMoto}).addTo(map);
                }

                db.channel('live-track').on('postgres_changes', { 
                    event: 'UPDATE', schema: 'public', table: 'entregadores', filter: `id=eq.${moto.id}` 
                }, payload => {
                    const { lat, lng } = payload.new;
                    if(lat && lng) {
                        if(!marker) marker = L.marker([lat, lng], {icon: iconMoto}).addTo(map);
                        else marker.setLatLng([lat, lng]);
                        map.panTo([lat, lng], { animate: true, duration: 1.5 });
                    }
                }).subscribe();

            } catch (e) {
                ui.setBadge('<i class="fa-solid fa-circle-exclamation"></i> Erro');
                document.getElementById('footer-title').innerText = "Ops!";
                document.getElementById('moto-nome').innerText = e.message;
                ui.hideLoading();
            }
        }

        window.onload = initTracking;
    </script>
</body>
</html>
