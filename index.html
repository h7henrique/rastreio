<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EasyOrder | Rastreio ao Vivo Pro</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --bg: #0C0C0C; 
            --card: #161616;
            --primary: #EA1D2C; 
            --text: #FFFFFF; 
            --success: #10B981; 
            --border: #262626;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            height: -webkit-fill-available;
            overflow: hidden; 
        }

        header { 
            background: rgba(12, 12, 12, 0.95); 
            backdrop-filter: blur(10px);
            padding: env(safe-area-inset-top) 15px 12px; 
            text-align: center; 
            border-bottom: 1px solid var(--border); 
            z-index: 100;
            flex-shrink: 0;
        }
        
        .title { 
            font-family: 'Oswald', sans-serif; 
            font-size: 1.1rem; 
            letter-spacing: 1.5px; 
            text-transform: uppercase;
        }

        .status-badge { 
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--card); 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-weight: 700; 
            font-size: 0.75rem; 
            border: 1px solid var(--border);
            margin-top: 6px;
        }
        
        .status-badge.success { border-color: var(--success); color: var(--success); }

        #map-wrapper { flex: 1; position: relative; width: 100%; }
        #map { width: 100%; height: 100%; z-index: 1; filter: grayscale(0.2) contrast(1.1); }

        #loading-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); display: flex; justify-content: center; 
            align-items: center; z-index: 150; transition: 0.6s ease; 
        }

        .footer-info { 
            position: absolute; bottom: 20px; left: 10px; right: 10px;
            max-width: 500px; margin: 0 auto;
            background: var(--card); padding: 15px; z-index: 100; 
            border-radius: 18 (px); border: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .moto-icon-box { 
            width: 48px; height: 48px; flex-shrink: 0;
            background: var(--bg); border-radius: 14px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 1.2rem; color: var(--primary); border: 1px solid var(--border);
            position: relative;
        }

        .pulse { position: absolute; width: 100%; height: 100%; border-radius: 14px; border: 2px solid var(--primary); animation: pulsar 2s infinite; }
        @keyframes pulsar { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.4); opacity: 0; } }

        .info-text { flex: 1; min-width: 0; }
        .info-text h3 { margin: 0; font-size: 0.95rem; font-weight: 800; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .info-text p { margin: 1px 0 0; color: #999; font-size: 0.75rem; }

        .btn-call { width: 42px; height: 42px; flex-shrink: 0; border-radius: 50%; background: #25D366; display: flex; justify-content: center; align-items: center; color: white; text-decoration: none; font-size: 1.3rem; }

        .loader { width: 30px; height: 30px; border: 3px solid #222; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <h1 class="title">EasyOrder <span style="color:var(--primary)">Live</span></h1>
        <div class="status-badge" id="status-badge">
            <i class="fa-solid fa-circle-notch fa-spin"></i> Conectando...
        </div>
    </header>

    <div id="map-wrapper">
        <div id="loading-overlay"><div class="loader"></div></div>
        <div id="map"></div>

        <div class="footer-info">
            <div class="moto-icon-box">
                <div class="pulse"></div>
                <i class="fa-solid fa-motorcycle"></i>
            </div>
            <div class="info-text">
                <h3 id="eta-text">Calculando rota...</h3>
                <p id="moto-nome">Aguardando GPS</p>
            </div>
            <a href="#" id="link-zap" class="btn-call" style="display:none;"><i class="fa-brands fa-whatsapp"></i></a>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://tyokrmmtluixdosmmygf.supabase.co';
        const supabaseKey = 'sb_publishable_xm_hnVYyfmh4mONa2Hy-7A_3M9M0ftf';
        const db = supabase.createClient(supabaseUrl, supabaseKey);

        let map, marker;
        let clientPos = [-23.5505, -46.6333]; // Fallback: SP

        const iconMoto = L.divIcon({
            html: '<div style="background:#EA1D2C; border:2px solid white; border-radius:50%; width:34px; height:34px; display:flex; justify-content:center; align-items:center; box-shadow:0 0 15px rgba(234, 29, 44, 0.6)"><i class="fa-solid fa-motorcycle" style="color:white; font-size:14px"></i></div>',
            className: 'moto-marker', iconSize: [34, 34], iconAnchor: [17, 17]
        });

        // FUNÇÃO PARA CALCULAR TEMPO ESTIMADO (ETA)
        async function updateETA(motoLat, motoLng) {
            try {
                // Usando a API gratuita do OSRM para calcular tempo de percurso (perfil de carro/moto)
                const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${motoLng},${motoLat};${clientPos[1]},${clientPos[0]}?overview=false`);
                const data = await res.json();
                
                if (data.routes && data.routes[0]) {
                    const durationMin = Math.round(data.routes[0].duration / 60);
                    const distanceKm = (data.routes[0].distance / 1000).toFixed(1);
                    document.getElementById('eta-text').innerText = `Chega em ~${durationMin + 2} min (${distanceKm} km)`;
                }
            } catch (e) {
                document.getElementById('eta-text').innerText = "Em trânsito...";
            }
        }

        async function initTracking() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const pedidoId = urlParams.get('pedido');
                if(!pedidoId) throw new Error('Link Inválido');

                const { data: pedido } = await db.from('pedidos').select('*').eq('id', pedidoId).single();
                
                // Pegar posição do cliente do pedido (Se houver no DB)
                if(pedido.lat_cliente) clientPos = [pedido.lat_cliente, pedido.lng_cliente];

                if(pedido.status === 'entregue') {
                    document.getElementById('status-badge').innerHTML = 'Entrega Concluída';
                    document.getElementById('eta-text').innerText = "Pedido Entregue!";
                    document.getElementById('loading-overlay').style.display = 'none';
                    return;
                }

                const { data: moto } = await db.from('entregadores').select('*').eq('id', pedido.entregador_id).single();

                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 600);
                
                document.getElementById('status-badge').innerText = "Em Entrega";
                document.getElementById('status-badge').classList.add('success');
                document.getElementById('moto-nome').innerText = `Entregador: ${moto.nome}`;

                if(moto.zap) {
                    const btn = document.getElementById('link-zap');
                    btn.href = `https://wa.me/55${moto.zap.replace(/\D/g,'')}`;
                    btn.style.display = 'flex';
                }

                // Iniciar Mapa
                map = L.map('map', { zoomControl: false }).setView([moto.lat, moto.lng], 16);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
                
                marker = L.marker([moto.lat, moto.lng], {icon: iconMoto}).addTo(map);
                updateETA(moto.lat, moto.lng);

                // REALTIME
                db.channel('live').on('postgres_changes', { 
                    event: 'UPDATE', schema: 'public', table: 'entregadores', filter: `id=eq.${moto.id}` 
                }, payload => {
                    const { lat, lng } = payload.new;
                    marker.setLatLng([lat, lng]);
                    map.panTo([lat, lng], { animate: true, duration: 2 });
                    updateETA(lat, lng);
                }).subscribe();

            } catch (e) {
                document.getElementById('eta-text').innerText = "Erro ao carregar";
                document.getElementById('loading-overlay').style.display = 'none';
            }
        }

        window.onload = initTracking;
    </script>
</body>
</html>
</body>

</html>
