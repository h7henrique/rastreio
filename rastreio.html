<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EasyOrder | Rastreio ao Vivo</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --bg: #111; --primary: #EA1D2C; --text: #FFF; --success: #10B981; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: #000; padding: 20px; text-align: center; border-bottom: 2px solid #222; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .title { font-family: 'Oswald', sans-serif; font-size: 1.5rem; letter-spacing: 1px; color: var(--text); margin: 0; }
        .status-badge { display: inline-block; background: rgba(234, 29, 44, 0.15); color: var(--primary); padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; margin-top: 10px; border: 1px solid var(--primary); transition: 0.3s; }
        .status-badge.success { background: rgba(16, 185, 129, 0.15); color: var(--success); border-color: var(--success); }
        
        /* Container principal que segura o mapa e a tela de carregamento */
        #map-wrapper { flex: 1; position: relative; width: 100%; background: #222; }
        
        /* O mapa puro (Sem flexbox para não bugar o Leaflet) */
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Tela de carregamento por cima do mapa */
        #loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #222; display: flex; justify-content: center; align-items: center; z-index: 5; transition: 0.5s; }
        
        .footer-info { background: #000; padding: 20px; z-index: 10; border-top: 2px solid #222; display: flex; align-items: center; gap: 15px; position: relative; }
        .moto-icon-box { width: 50px; height: 50px; background: #222; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; color: var(--primary); }
        .info-text h3 { margin: 0 0 5px 0; font-size: 1.1rem; }
        .info-text p { margin: 0; color: #888; font-size: 0.9rem; }

        .loader { border: 3px solid #333; border-top: 3px solid var(--primary); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <h1 class="title">EASYORDER TRACKING</h1>
        <div class="status-badge" id="status-badge"><i class="fa-solid fa-spinner fa-spin"></i> Localizando pedido...</div>
    </header>

    <div id="map-wrapper">
        <div id="loading-overlay"><div class="loader"></div></div>
        <div id="map"></div>
    </div>

    <div class="footer-info">
        <div class="moto-icon-box" id="moto-icon"><i class="fa-solid fa-motorcycle"></i></div>
        <div class="info-text">
            <h3 id="footer-title">Preparando o rastreio...</h3>
            <p id="moto-nome">Aguarde um momento.</p>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://tyokrmmtluixdosmmygf.supabase.co';
        const supabaseKey = 'sb_publishable_xm_hnVYyfmh4mONa2Hy-7A_3M9M0ftf';
        const db = supabase.createClient(supabaseUrl, supabaseKey);

        let map = null;
        let marker = null;
        const iconMoto = L.divIcon({
            html: '<div style="background:#EA1D2C; border:3px solid white; border-radius:50%; width:40px; height:40px; display:flex; justify-content:center; align-items:center; box-shadow:0 0 15px rgba(234, 29, 44, 0.8)"><i class="fa-solid fa-motorcycle" style="color:white; font-size:20px"></i></div>',
            className: '', iconSize: [40, 40], iconAnchor: [20, 20]
        });

        const ui = {
            setBadge: (text, type = 'normal') => {
                const el = document.getElementById('status-badge');
                el.innerHTML = text;
                if(type === 'success') el.classList.add('success');
            },
            setError: (msg) => {
                ui.setBadge(`<i class="fa-solid fa-triangle-exclamation"></i> ${msg}`);
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('footer-title').innerText = "Ops!";
                document.getElementById('moto-nome').innerText = "Verifique o link enviado.";
            }
        };

        async function initTracking() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const rawPedido = urlParams.get('pedido');
                
                if(!rawPedido || isNaN(rawPedido)) throw new Error('ID Inválido');
                const pedidoId = parseInt(rawPedido);

                const { data: pedido, error: errPedido } = await db.from('pedidos')
                    .select('status, entregador_id')
                    .eq('id', pedidoId)
                    .single();
                
                if(errPedido || !pedido) throw new Error('Pedido não encontrado');

                if(pedido.status === 'entregue') {
                    ui.setBadge("✅ Pedido Entregue", "success");
                    document.getElementById('loading-overlay').style.display = 'none';
                    document.getElementById('footer-title').innerText = "Bom apetite!";
                    document.getElementById('moto-nome').innerText = "Entrega finalizada com sucesso.";
                    return;
                }

                if(!pedido.entregador_id || pedido.status !== 'em_rota') {
                    ui.setBadge("<i class='fa-solid fa-fire-burner'></i> Preparando na Cozinha");
                    document.getElementById('footer-title').innerText = "Quase lá...";
                    document.getElementById('moto-nome').innerText = "Aguardando entregador sair da loja.";
                    return;
                }

                const idMotoboy = pedido.entregador_id;
                const { data: moto } = await db.from('entregadores')
                    .select('nome, lat, lng')
                    .eq('id', idMotoboy)
                    .single();
                
                if(!moto) throw new Error('Entregador não encontrado.');

                // Remove a tela de carregamento suavemente
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 500);

                // Inicia o mapa
                map = L.map('map').setView([moto.lat || -21.7946, moto.lng || -48.1766], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                
                // Força o mapa a recalcular o tamanho (Evita bug de mapa cinza)
                setTimeout(() => map.invalidateSize(), 400);

                ui.setBadge("<i class='fa-solid fa-satellite-dish'></i> Rastreando ao vivo");
                document.getElementById('footer-title').innerText = "Seu lanche está a caminho!";
                document.getElementById('moto-nome').innerText = `Entregador: ${moto.nome.split(' ')[0]}`;

                if(moto.lat) {
                    marker = L.marker([moto.lat, moto.lng], {icon: iconMoto}).addTo(map);
                }

                db.channel('tracking-cliente').on('postgres_changes', { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'entregadores', 
                    filter: `id=eq.${idMotoboy}` 
                }, payload => {
                    const lat = payload.new.lat;
                    const lng = payload.new.lng;
                    if(lat && lng) {
                        if(!marker) {
                            marker = L.marker([lat, lng], {icon: iconMoto}).addTo(map);
                        } else {
                            marker.setLatLng([lat, lng]);
                        }
                        map.panTo([lat, lng]); 
                    }
                }).subscribe();

            } catch (error) {
                console.error("Tracking Error:", error);
                ui.setError(error.message === 'ID Inválido' ? "Link inválido." : "Erro ao carregar mapa.");
            }
        }

        initTracking();
    </script>
</body>
</html>
